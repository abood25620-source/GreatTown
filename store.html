<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر Great Town | Season 1</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #1d4ed8;
    --primary-hover: #1e40af;
    --bg-dark: #020617;
    --bg-card: #0f172a;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --glass-border: rgba(30, 58, 138, 0.2);
    --success: #10b981;
}

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
}

.top-bar {
    background: rgba(2, 6, 23, 0.9);
    padding: 25px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.home-btn {
    background: rgba(255,255,255,0.05);
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    border: 1px solid var(--glass-border);
    transition: 0.3s;
}
.home-btn:hover { background: var(--primary); transform: translateX(5px); }

.server-logo img { height: 60px; filter: drop-shadow(0 0 10px var(--primary)); }

.container {
    max-width: 1200px;
    margin: auto;
    padding: 60px 20px;
}

h2 {
    text-align: center;
    font-size: 44px;
    font-weight: 900;
    margin-bottom: 60px;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
}

.card {
    background: var(--bg-card);
    border-radius: 24px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid var(--glass-border);
    position: relative;
}
.card:hover {
    transform: translateY(-10px);
    border-color: var(--primary);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(29, 78, 216, 0.1);
}

.card-img {
    width: 100%;
    height: 220px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.card:hover .card-img img { transform: scale(1.1); }

.card-content { padding: 25px; text-align: center; }
.card-content h3 { font-size: 22px; font-weight: 800; margin-bottom: 10px; color: #fff; }

.price {
    font-size: 24px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 20px;
}

.btn-buy {
    background: linear-gradient(135deg, var(--primary), #3b82f6);
    color: white;
    padding: 14px;
    border-radius: 16px;
    border: none;
    width: 100%;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.btn-buy:hover { transform: scale(1.05); filter: brightness(1.1); }

footer {
    text-align: center;
    padding: 40px;
    background: #010409;
    color: var(--text-muted);
    border-top: 1px solid var(--glass-border);
    margin-top: 100px;
}

/* 🛒 Modal */
#buyModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);
}
.modal-content {
    background: var(--bg-card); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px;
    border: 1px solid var(--glass-border); text-align: center;
}
.modal-input {
    width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
    border-radius: 12px; color: #fff; margin: 15px 0; font-family: 'Cairo'; outline: none;
}
.modal-input:focus { border-color: var(--primary); }
</style>
</head>

<body>

<div id="buyModal">
    <div class="modal-content">
        <h2 style="font-size: 28px; margin-bottom: 10px;">إكمال الطلب</h2>
        <p style="color: var(--text-muted);">يرجى إدخال اسمك في الديسكورد للتواصل معك</p>
        <input type="text" id="discordName" class="modal-input" placeholder="مثال: pO9Oq_#0001">
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-buy" onclick="confirmPurchase()">تأكيد الطلب</button>
            <button class="btn-buy" style="background: #334155;" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="top-bar">
    <a class="home-btn" href="index.html"><i class="fas fa-arrow-right"></i> الرئيسية</a>
    <div style="font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Great Town Store</div>
    <div class="server-logo">
        <img src="images/logo.png" onerror="this.src='https://via.placeholder.com/60'">
    </div>
</div>

<div class="container">
    <h2>🛍️ المنتجات المتوفرة</h2>
    <div class="products">
        
        <div class="card">
            <div class="card-img"><img src="images/car1.png" onerror="this.src='https://via.placeholder.com/400x250?text=VIP+Car'"></div>
            <div class="card-content">
                <h3>VIP Car Pack</h3>
                <div class="price">5 ريال</div>
                <button class="btn-buy" onclick="openBuyModal('VIP Car Pack', '5 ريال')"><i class="fas fa-shopping-cart"></i> شراء الآن</button>
            </div>
        </div>

        <div class="card">
            <div class="card-img"><img src="images/house.png" onerror="this.src='https://via.placeholder.com/400x250?text=Luxury+House'"></div>
            <div class="card-content">
                <h3>Luxury House</h3>
                <div class="price">5 ريال</div>
                <button class="btn-buy" onclick="openBuyModal('Luxury House', '5 ريال')"><i class="fas fa-shopping-cart"></i> شراء الآن</button>
            </div>
        </div>

    </div>
</div>

<footer>
    © Great Town Store 
</footer>

<script>
let currentProduct = null;
let currentPrice = null;

function openBuyModal(name, price) {
    currentProduct = name;
    currentPrice = price;
    document.getElementById('buyModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('buyModal').style.display = 'none';
}

async function confirmPurchase() {
    const discordName = document.getElementById('discordName').value;
    if (!discordName) return alert("يرجى إدخال اسم الديسكورد!");

    // سيتم استبدال هذا الرابط بالويبهوك الخاص بك في ملف config.lua
    const webhookURL = "https://discord.com/api/webhooks/YOUR_WEBHOOK_HERE"; 

    const data = {
        embeds: [{
            title: "🛒 طلب شراء جديد",
            color: 23296, // Blue
            fields: [
                { name: "📦 المنتج", value: currentProduct, inline: true },
                { name: "💰 السعر", value: currentPrice, inline: true },
                { name: "👤 العميل", value: discordName, inline: false }
            ],
            footer: { text: "Great Town Store Logs" },
            timestamp: new Date()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("تم إرسال طلبك بنجاح! سنتواصل معك قريباً.");
            closeModal();
        } else {
            alert("خطأ في الويبهوك: تأكد من صحة الرابط في الكود.");
        }
    } catch (e) {
        alert("فشل الاتصال: تأكد من إعدادات الويبهوك.");
    }
}
</script>

</body>
</html>
