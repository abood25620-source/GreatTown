<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Town | Season 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .top-line {
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 15px rgba(29, 78, 216, 0.5);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 50px;
            filter: drop-shadow(0 0 8px var(--primary));
        }

        .logo span {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons a {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            padding: 10px 24px;
            border-radius: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-buttons a:hover {
            background: var(--primary);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29, 78, 216, 0.3);
        }

        /* ===== Header Section ===== */
        header {
            position: relative;
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(29, 78, 216, 0.15) 0%, var(--bg-dark) 70%);
            padding: 0 20px;
        }

        .center-logo {
            margin-bottom: 40px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .center-logo img {
            width: 280px;
            filter: drop-shadow(0 0 30px rgba(29, 78, 216, 0.4));
        }

        .header-content h1 {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .header-content p {
            max-width: 800px;
            margin: auto;
            font-size: 20px;
            color: var(--text-muted);
            line-height: 1.8;
            text-align: center;
        }

        .cta-buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn-main {
            padding: 16px 40px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            transition: 0.4s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 15px 30px rgba(29, 78, 216, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #010409;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .nav-buttons { display: none; }
            .header-content h1 { font-size: 40px; }
            .header-content p { font-size: 16px; }
            .center-logo img { width: 180px; }
        }
    </style>
</head>

<body>

<div class="top-line"></div>

<nav class="navbar">
    <div class="navbar-left">
        <div class="logo">
            <img src="images/Logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50'" />
            <span>Great Town | Season 1</span>
        </div>
    </div>
    
    <div class="nav-buttons">
        <a href="store.html"><i class="fas fa-shopping-cart"></i> المتجر</a>
        <a href="rules.html"><i class="fas fa-file-contract"></i> القوانين</a>
        <a href="https://discord.gg/XUTrAajmNc" target="_blank"><i class="fab fa-discord"></i> الدسكورد</a>
    </div>
</nav>

<header>
    <div class="center-logo">
        <img src="images/Logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/280'">
    </div>

    <div class="header-content">
        <h1>Great Town | Season 1</h1>
        <p>
            حياكم الله في سيرفر <b>Great Town</b> للرول بلاي<br>
            تجربة فخمة واحترافية بانتظارك، مجتمع متكامل وفعاليات يومية.
        </p>
    </div>

    <div class="cta-buttons">
        <a href="https://discord.gg/XUTrAajmNc" class="btn-main btn-primary">
            <i class="fab fa-discord"></i> انضم إلينا الآن
        </a>
    </div>
</header>

<footer>
    © Great Town | Season 1 - جميع الحقوق محفوظة<br>
</footer>

</body>
</html>
